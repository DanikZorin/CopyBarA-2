name: test_on_push

on: [push]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Show Coverage
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Находим все файлы .gcno (они создаются при компиляции)
          # и запускаем gcov. Он сам найдет рядом файлы .gcda (данные тестов).
          # Флаг -no-output нужен, чтобы не забивать папку .gcov файлами.
          find build -name "*.gcno" -exec gcov -no-output {} + >> $GITHUB_STEP_SUMMARY
          
          echo '```' >> $GITHUB_STEP_SUMMARY
