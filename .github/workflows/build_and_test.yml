name: test_on_push

on: [push]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Extract Coverage
        run: |
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY
          xcrun llvm-cov report ./build/lab4test \
            -instr-profile=$(find build -name "*.profraw" | head -n 1) \
            -ignore-filename-regex=".*tests.*|.*v1.*" >> $GITHUB_STEP_SUMMARY || echo "No coverage data found" >> $GITHUB_STEP_SUMMARY
