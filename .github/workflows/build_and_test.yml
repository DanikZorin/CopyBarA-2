name: test_on_push

on: [push]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Install gcovr
        run: pip3 install gcovr --break-system-packages

      - name: Show Coverage
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          
          # Используем полное имя для вызова llvm-cov gcov
          # И добавляем --markdown для красивой таблицы
          python3 -m gcovr -r . build/ \
            --gcov-executable "$(xcrun -f llvm-cov) gcov" \
            --exclude '.*tests.*' \
            --exclude '.*_deps.*' \
            --markdown >> $GITHUB_STEP_SUMMARY
