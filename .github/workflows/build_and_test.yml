name: test_on_push

on: [push]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Install gcovr
        run: pip3 install gcovr --break-system-packages

      - name: Show Coverage
        run: |
          echo "## 📊 Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          
          # Генерируем отчет в формате GitHub Markdown
          # Мы не используем --github-summary, так как он капризный.
          # Вместо него используем --md, который работает стабильнее.
          python3 -m gcovr -r . build/ \
            --gcov-executable "llvm-cov gcov" \
            --exclude '.*tests.*' \
            --exclude '.*_deps.*' \
            --markdown >> $GITHUB_STEP_SUMMARY
